name: Daily Streak

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-streak
  cancel-in-progress: false

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Make daily contribution commits
        env:
          COUNT: "12"
        run: |
          git config user.name  "BioNorthTech"
          git config user.email "bionorthtech@gmail.com"
          for i in $(seq 1 "$COUNT"); do
            git commit --allow-empty -m "chore: daily activity ($i/$COUNT) $(date -u +%F)"
          done
          git push origin HEAD:main
